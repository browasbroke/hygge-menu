<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hygge Kafé</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:   #F7F3EC;
      --beige:   #EDE5D6;
      --sand:    #D4C4AD;
      --brown:   #8C6D4F;
      --brown-d: #6B4F35;
      --dark:    #2D2017;
      --muted:   #7A6755;
      --sage:    #7A9E78;
      --white:   #FDFBF8;
      --r:       14px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--dark);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ---- Header ---- */
    .header {
      background: var(--white);
      padding: 16px 20px 0;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 1px 0 var(--beige);
    }

    .header__logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 2px;
    }
    .header__logo em { color: var(--brown); font-style: italic; font-weight: 400; }

    .header__sub {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ---- Category tabs ---- */
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 14px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      border: 1.5px solid var(--beige);
      background: transparent;
      color: var(--muted);
      transition: all .2s ease;
      flex-shrink: 0;
    }
    .tab.active {
      background: var(--brown);
      border-color: var(--brown);
      color: #fff;
    }

    /* ---- Content ---- */
    .content {
      padding: 16px 16px 100px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 12px;
    }

    /* ---- Menu cards ---- */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: var(--white);
      border-radius: var(--r);
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 0;
      box-shadow: 0 1px 8px rgba(45,32,23,.07);
      transition: transform .15s ease, box-shadow .15s ease;
      cursor: pointer;
    }
    .card:active { transform: scale(.98); }

    .card__img {
      width: 88px;
      min-height: 88px;
      flex-shrink: 0;
      background: var(--beige);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      overflow: hidden;
    }
    .card__img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card__body {
      flex: 1;
      padding: 12px 14px;
      min-width: 0;
    }

    .card__name {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card__desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card__price {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--brown);
    }

    /* ---- Bottom book button ---- */
    .book-btn {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px max(env(safe-area-inset-bottom), 12px);
      background: linear-gradient(to top, var(--cream) 80%, transparent);
    }

    .book-btn__inner {
      background: var(--brown);
      color: #fff;
      border: none;
      width: 100%;
      padding: 15px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .2s, transform .1s;
    }
    .book-btn__inner:active { background: var(--brown-d); transform: scale(.98); }

    /* ---- Empty state ---- */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ---- Entrance animation ---- */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .card { animation: fadeUp .25s ease both; }
    .card:nth-child(1)  { animation-delay: .03s; }
    .card:nth-child(2)  { animation-delay: .06s; }
    .card:nth-child(3)  { animation-delay: .09s; }
    .card:nth-child(4)  { animation-delay: .12s; }
    .card:nth-child(5)  { animation-delay: .15s; }
    .card:nth-child(6)  { animation-delay: .18s; }
    .card:nth-child(7)  { animation-delay: .21s; }
    .card:nth-child(8)  { animation-delay: .24s; }
  </style>
</head>
<body>

<div class="header">

    ]

// ============================================================
//  Telegram Web App
// ============================================================
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ============================================================
//  Рендер
// ============================================================
let activeCategory = Object.keys(MENU)[0];

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = Object.keys(MENU).map(cat => {
    const { emoji } = MENU[cat];
    const label = cat.replace(/^\S+\s+/, '');  // убираем эмодзи из названия
    return `<button class="tab ${cat === activeCategory ? 'active' : ''}"
      onclick="switchCategory('${cat.replace(/'/g, "\\'")}')"
    >${emoji} ${label}</button>`;
  }).join('');
}

function renderItems() {
  const { items, note } = MENU[activeCategory];
  document.getElementById('sectionTitle').textContent =
    activeCategory.replace(/^\S+\s+/, '');

  const list = document.getElementById('menuList');

  if (note) {
    list.innerHTML = `<div style="
      background:var(--beige);border-radius:10px;
      padding:10px 14px;font-size:12px;color:var(--muted);
      margin-bottom:4px;
    ">⏰ ${note}</div>`;
  } else {
    list.innerHTML = '';
  }

  list.innerHTML += items.map(item => `
    <div class="card">
      <div class="card__img">${MENU[activeCategory].emoji}</div>
      <div class="card__body">
        <div class="card__name">${item.name}</div>
        <div class="card__desc">${item.desc}</div>
        <div class="card__price">${item.price} ₽</div>
      </div>
    </div>
  `).join('');
}

function switchCategory(cat) {
  activeCategory = cat;
  renderTabs();
  renderItems();
  // Scroll content to top
  document.querySelector('.content').scrollTo({ top: 0, behavior: 'smooth' });
  // Scroll active tab into view
  const activetab = document.querySelector('.tab.active');
  if (activetab) activetab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ---- Кнопка бронирования ----
document.getElementById('bookBtn').addEventListener('click', () => {
  tg.sendData(JSON.stringify({ action: 'book' }));
  // Если открыто не из бота — закрываем и показываем подсказку
  if (!tg.initData) {
    alert('Откройте бота @HyggeKafeBot и нажмите "Забронировать стол"');
  }
});

// Инициализация
renderTabs();

</script>

</html>
